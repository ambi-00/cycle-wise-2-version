<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CycleWise Safety Mode</title>
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    h2 {
      font-size: 18px;
      margin: 0 0 15px 0;
      color: #1a202c;
    }
    
    .status {
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .status.active {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }
    
    .status.inactive {
      background: #f7fafc;
      color: #4a5568;
    }
    
    .status-icon {
      font-size: 32px;
      margin-bottom: 5px;
    }
    
    .status-text {
      font-weight: 600;
      font-size: 14px;
    }
    
    .info {
      font-size: 13px;
      color: #4a5568;
      line-height: 1.5;
      margin-bottom: 15px;
    }
    
    .blocked-list {
      background: #f7fafc;
      border-radius: 8px;
      padding: 12px;
      margin-top: 10px;
    }
    
    .blocked-list h3 {
      font-size: 13px;
      margin: 0 0 8px 0;
      color: #2d3748;
    }
    
    .blocked-url {
      font-size: 12px;
      color: #4a5568;
      font-family: monospace;
      padding: 6px 8px;
      background: white;
      border-radius: 6px;
      margin-bottom: 6px;
      word-break: break-all;
    }
    
    .footer {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #e2e8f0;
      text-align: center;
    }
    
    .footer a {
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2>🌸 CycleWise Safety Mode</h2>
  
  <div class="status" id="status">
    <div class="status-icon" id="statusIcon">🛡️</div>
    <div class="status-text" id="statusText">Loading...</div>
  </div>
  
  <div class="info" id="info">
    Checking settings...
  </div>
  
  <div class="blocked-list" id="blockedList" style="display: none;">
    <h3>Blocked Trading Platforms:</h3>
    <div id="urlList"></div>
  </div>
  
  <div class="footer">
    <a href="http://localhost:8081/settings" target="_blank">Open Settings in CycleWise</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
